<!-- Theme Switcher Demo / Please review for Insecure Design -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Theme Switcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

   <h2>Login</h2>
  <form action="/login" method="GET">
      <label>Username:</label>
        <input type="text" name="username" />
        <br /><br />

      <label>Password:</label>
      <input type="password" name="password" />
      <br /><br />

    <button type="submit">Login</button>
  </form>

  <hr />

  <h2>Search Profile</h2>
  <form action="/search" method="GET">
    <label>Enter username:</label>
    <input type="text" name="q" />
    <button type="submit">Search</button>
  </form>

  <hr />

  <h2>Leave a Comment</h2>
  <form action="/comment" method="POST">
    <textarea name="comment" rows="5" cols="40"></textarea>
    <br />
    <button type="submit">Post Comment</button>
  </form>

  <hr />

  <h2>Admin Panel</h2>
  <p>
    <a href="/admin">Go to Admin Dashboard</a>
  </p>

  <script>

    localStorage.setItem("adminPassword", "admin123");
    localStorage.setItem("sessionToken", "super-insecure-token");


    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    if (name) {
      document.body.innerHTML += "<p>Welcome " + name + "</p>";
    }
  </script>

  <div class="container">
    <header class="header">
      <h1>Theme Switcher Demo</h1>
      <p>Choose a theme and we’ll remember it for your next visit.</p>
    </header>

    <section class="controls">
      <label for="theme-select">Select Theme:</label>
      <select id="theme-select">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="pastel">Pastel</option>
      </select>
    </section>

    <main class="content">
      <div class="card">
        <h2>Sample Content</h2>
        <p>
          This is some example text to showcase the current theme.
          Try switching themes using the dropdown above.
        </p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
